name: Release Desktop Bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nyro-desktop-linux-bundle
            bundles: appimage,deb
            rust_target: ""
          - os: macos-latest
            artifact_name: nyro-desktop-macos-aarch64-bundle
            bundles: app,dmg
            rust_target: aarch64-apple-darwin
          - os: macos-latest
            artifact_name: nyro-desktop-macos-x86_64-bundle
            bundles: app,dmg
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            artifact_name: nyro-desktop-windows-bundle
            bundles: nsis,msi
            rust_target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm -C webui install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop bundles
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo tauri build --bundles ${{ matrix.bundles }} --target ${{ matrix.rust_target }}
          else
            cargo tauri build --bundles ${{ matrix.bundles }}
          fi
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload desktop bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/**/release/bundle/**
          if-no-files-found: error

  publish-desktop:
    runs-on: ubuntu-latest
    needs:
      - build-desktop
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nyro-desktop-*
          merge-multiple: true

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.msi" -o -name "*-setup.exe" \
            -o -name "*.app.tar.gz" -o -name "*.sig" \
          \) -exec cp -f {} release-assets/ \;

      - name: Generate latest.json
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: python3 scripts/release/gen_latest_json.py --assets-dir release-assets --output latest.json

      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Upload desktop release artifact pack
        uses: actions/upload-artifact@v4
        with:
          name: nyro-desktop-release-pack
          path: |
            release-assets/**
            latest.json

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Nyro ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            release-assets/*
            latest.json
          replacesArtifacts: true
          makeLatest: legacy
